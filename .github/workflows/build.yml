name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: xdesk-windows-x64.exe
            asset_name: xdesk-windows-x64.exe
          - os: ubuntu-latest
            artifact_name: xdesk-linux-x64
            asset_name: xdesk-linux-x64
          - os: macos-latest
            artifact_name: xdesk-macos-x64
            asset_name: xdesk-macos-x64
          - os: macos-latest
            artifact_name: xdesk-macos-arm64
            asset_name: xdesk-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pkg dist/index.js --targets node20-win-x64 --output xdesk-windows-x64.exe
        shell: bash

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pkg dist/index.js --targets node20-linux-x64 --output xdesk-linux-x64
          chmod +x xdesk-linux-x64

      - name: Build executable (macOS x64)
        if: matrix.os == 'macos-latest' && matrix.artifact_name == 'xdesk-macos-x64'
        run: |
          pkg dist/index.js --targets node20-macos-x64 --output xdesk-macos-x64
          chmod +x xdesk-macos-x64

      - name: Build executable (macOS ARM64)
        if: matrix.os == 'macos-latest' && matrix.artifact_name == 'xdesk-macos-arm64'
        run: |
          pkg dist/index.js --targets node20-macos-arm64 --output xdesk-macos-arm64
          chmod +x xdesk-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/xdesk-windows-x64/xdesk-windows-x64.exe
            artifacts/xdesk-linux-x64/xdesk-linux-x64
            artifacts/xdesk-macos-x64/xdesk-macos-x64
            artifacts/xdesk-macos-arm64/xdesk-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
