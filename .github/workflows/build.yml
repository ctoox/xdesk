name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: xdesk-windows-x64.exe
            target: node18-win-x64
          - os: ubuntu-latest
            artifact_name: xdesk-linux-x64
            target: node18-linux-x64
          - os: macos-latest
            artifact_name: xdesk-macos
            target: node18-macos-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust (Windows only)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust capture module (Windows only)
        if: runner.os == 'Windows'
        run: |
          cd capture-rs
          cargo build --release
        shell: bash

      - name: Build Rust input module (Windows only)
        if: runner.os == 'Windows'
        run: |
          cd input-rs
          cargo build --release
        shell: bash

      - name: Copy Rust binaries (Windows only)
        if: runner.os == 'Windows'
        run: |
          mkdir -p bin
          cp capture-rs/target/release/xdesk-capture.exe bin/
          cp input-rs/target/release/xdesk-input.exe bin/
        shell: bash

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable
        run: pkg dist/index.js --targets ${{ matrix.target }} --output ${{ matrix.artifact_name }}

      - name: Make executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/xdesk-windows-x64.exe/*
            artifacts/xdesk-linux-x64/*
            artifacts/xdesk-macos/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
